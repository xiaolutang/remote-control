name: rc_client
description: "Remote Control Client - Terminal access from mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # WebSocket
  web_socket_channel: ^3.0.0

  # State management
  provider: ^6.1.0

  # Local storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0

  # ANSI parsing
  ansicolor: ^2.0.2

  # HTTP client
  http: ^1.2.0

  # RSA + AES encryption
  pointycastle: ^3.9.1
  asn1lib: ^1.5.0

  # UUID generation
  uuid: ^4.5.0
  xterm: ^4.0.0
  path: ^1.9.0
  path_provider: ^2.1.5

dependency_overrides:
  xterm:
    path: third_party/xterm

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
