# Remote Control 生产部署配置
# 使用方式: ./deploy/deploy.sh
# 三网模式: gateway(对外) + infra-network(共享服务) + rc-network(项目私有)

services:
  # ===== Redis (项目私有) =====
  redis:
    image: redis:7-alpine
    container_name: rc-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command:
      - sh
      - -lc
      - >
        redis-server
        --appendonly ${REDIS_APPENDONLY:-no}
        --appendfsync ${REDIS_APPENDFSYNC:-everysec}
        --auto-aof-rewrite-percentage ${REDIS_AUTO_AOF_REWRITE_PERCENTAGE:-100}
        --auto-aof-rewrite-min-size ${REDIS_AUTO_AOF_REWRITE_MIN_SIZE:-64mb}
        --aof-use-rdb-preamble yes
        --requirepass ${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}
    networks:
      - rc-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===== Server =====
  server:
    image: remote-control-server:latest
    container_name: rc-server
    restart: unless-stopped
    ports:
      - "${RC_DIRECT_PORT:-8880}:8000"
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:?请在 .env 或环境变量中设置 JWT_SECRET}
      - TRUSTED_PROXY_TLS_TOKEN=${TRUSTED_PROXY_TLS_TOKEN:?请在 .env 或环境变量中设置 TRUSTED_PROXY_TLS_TOKEN}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LOG_SERVICE_URL=http://log-service:8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_PATH=/data/users.db
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_METRICS_EXPORTER=${OTEL_METRICS_EXPORTER:-none}
      - LLM_TRACE_CONSOLE=${LLM_TRACE_CONSOLE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - user_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gateway
      - infra-network
      - rc-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rc.rule=${TRAEFIK_ROUTER_RULE:-Host(`localhost`) && PathPrefix(`/rc/`)}"
      - "traefik.http.routers.rc.entrypoints=websecure"
      - "traefik.http.routers.rc.tls=true"
      - "traefik.http.routers.rc.tls.certresolver=ali"
      - "traefik.http.routers.rc-local.rule=(Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/rc/`)"
      - "traefik.http.routers.rc-local.entrypoints=web"
      - "traefik.http.routers.rc-local.service=rc-server"
      - "traefik.http.routers.rc-local.middlewares=rc-strip"
      - "traefik.http.routers.rc-local-secure.rule=(Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/rc/`)"
      - "traefik.http.routers.rc-local-secure.entrypoints=websecure"
      - "traefik.http.routers.rc-local-secure.tls=true"
      - "traefik.http.routers.rc-local-secure.service=rc-server"
      - "traefik.http.routers.rc-local-secure.middlewares=rc-strip,rc-trusted-tls"
      - "traefik.http.routers.rc.middlewares=rc-strip,rc-trusted-tls"
      - "traefik.http.middlewares.rc-strip.stripprefix.prefixes=/rc"
      - "traefik.http.middlewares.rc-trusted-tls.headers.customrequestheaders.x-rc-forwarded-tls=${TRUSTED_PROXY_TLS_TOKEN:?请在 .env 或环境变量中设置 TRUSTED_PROXY_TLS_TOKEN}"
      - "traefik.http.routers.rc.service=rc-server"
      - "traefik.http.services.rc-server.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== Agent =====
  agent:
    image: remote-control-agent:latest
    container_name: rc-agent
    profiles:
      - standalone-agent
    restart: unless-stopped
    environment:
      - SERVER_URL=${SERVER_URL:-ws://server:8000}
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - AGENT_USERNAME=${AGENT_USERNAME:-}
      - AGENT_PASSWORD=${AGENT_PASSWORD:-}
      - LOG_SERVICE_URL=http://log-service:8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      server:
        condition: service_healthy
    networks:
      - infra-network
      - rc-network

networks:
  gateway:
    external: true
  infra-network:
    external: true
  rc-network:
    name: rc-network
    driver: bridge

volumes:
  redis_data:
  user_data:
