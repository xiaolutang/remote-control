id: ic_007_command_view_log
category: intent_classification
description: "测试 Agent 正确识别查看日志需求为 command 类型"
input:
  intent: "查看一下服务器的日志最后50行"
  context:
    cwd: /home/user/project
    device_online: true
    mock_tool_responses:
      "ls /var/log": "syslog\nauth.log\ndaemon.log\nserver.log"
      "find": "server.log\naccess.log\nerror.log"
expected:
  response_type: ["command"]
  steps_contain: ["tail"]
  steps_not_contain: []
graders: ["response_type_match", "steps_structure"]
metadata:
  source: daily_usage
  difficulty: easy
  tags: ["command", "tail", "log"]
  single_turn: true
  reference_solution: "response_type=command, steps=[tail -n 50 server.log]"
