id: ic_010_aiprompt_write_test
category: intent_classification
description: "测试 Agent 将生成测试需求识别为 command 类型（生成 claude 命令）"
input:
  intent: "帮我为 database.py 写单元测试"
  context:
    cwd: /home/user/project
    device_online: true
    mock_tool_responses: {}
expected:
  response_type: ["command"]
  steps_contain: ["claude"]
  steps_not_contain: []
graders: ["response_type_match", "steps_structure", "steps_contain_match"]
metadata:
  source: daily_usage
  difficulty: medium
  tags: ["command", "test", "claude_code"]
  single_turn: true
  reference_solution: "response_type=command, 生成 claude -p '为 database.py 写单元测试' 命令"
