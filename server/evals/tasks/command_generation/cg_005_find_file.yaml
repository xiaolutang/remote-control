id: cg_005_find_file
category: command_generation
description: "测试 Agent 生成文件查找命令"
input:
  intent: "找出项目里所有的 Python 文件"
  context:
    cwd: /home/user/project
    device_online: true
    mock_tool_responses: {}
expected:
  response_type: ["command"]
  steps_contain: ["find"]
  steps_not_contain: []
graders: ["response_type_match", "steps_contain_match"]
metadata:
  source: daily_usage
  difficulty: easy
  tags: ["command", "find", "file_search"]
  reference_solution: "response_type=command, steps=[find . -name '*.py']"
